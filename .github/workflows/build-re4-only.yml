name: Build RE4 Only
on: [push, workflow_dispatch]
env:
  BUILD_TYPE: Release

jobs:
  build-re4:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Configure CMake
        run: cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DDEVELOPER_MODE=ON "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build RE4
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target RE4
